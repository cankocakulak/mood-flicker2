name: MoodFlicker2
options:
  bundleIdPrefix: com.cankocakulak
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
configs:
  Debug: debug
  Staging: release
  Release: release
configFiles:
  Debug: Configs/Debug.xcconfig
  Staging: Configs/Staging.xcconfig
  Release: Configs/Release.xcconfig
settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDevelopmentRegion: en
    INFOPLIST_KEY_CFBundleDisplayName: $(APP_DISPLAY_NAME)
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_AppEnvironmentName: $(APP_ENVIRONMENT_NAME)
    INFOPLIST_KEY_AppAPIBaseURL: $(API_BASE_URL)
    INFOPLIST_KEY_AppWebSocketURL: $(WEB_SOCKET_URL)
    INFOPLIST_KEY_AppAPIKey: $(API_KEY)
    PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID)$(BUNDLE_ID_SUFFIX)
    TARGETED_DEVICE_FAMILY: 1
packages: {}
targets:
  MoodFlicker2:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    settings:
      base:
        PRODUCT_NAME: MoodFlicker2
    entitlements:
      path: MoodFlicker2.entitlements
      properties:
        com.apple.security.application-groups: [group.com.cankocakulak.moodflicker2]
    scheme:
      gatherCoverageData: true
      testTargets:
        - MoodFlicker2Tests
        - MoodFlicker2UITests

  MoodFlicker2Tests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: MoodFlicker2
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID).tests$(BUNDLE_ID_SUFFIX)
        GENERATE_INFOPLIST_FILE: YES

  MoodFlicker2UITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: MoodFlicker2
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID).uitests$(BUNDLE_ID_SUFFIX)
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: MoodFlicker2

  MoodFlicker2WidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widget
      - path: App/Features/Mood/Domain/MoodEntry.swift
      - path: App/Features/Mood/Data/MoodRepository.swift
    settings:
      base:
        PRODUCT_NAME: MoodFlicker2Widget
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID).widget$(BUNDLE_ID_SUFFIX)
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: ""
        INFOPLIST_KEY_CFBundleDisplayName: MoodFlicker2 Widget
        INFOPLIST_KEY_NSExtension: |
          <dict>
            <key>NSExtensionPointIdentifier</key>
            <string>com.apple.widgetkit-extension</string>
          </dict>
    entitlements:
      path: Widget/MoodFlicker2WidgetExtension.entitlements
      properties:
        com.apple.security.application-groups: [group.com.cankocakulak.moodflicker2]
    dependencies:
      - sdk: SwiftData.framework
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: AppIntents.framework
      - sdk: Charts.framework
